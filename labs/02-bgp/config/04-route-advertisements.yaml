# Advertise the default pod network (PodNetwork) via BGP. Selects the
# FRRConfiguration labeled use-for-advertisements.
---
apiVersion: k8s.ovn.org/v1
kind: RouteAdvertisements
metadata:
  name: bgp-pod-network
spec:
  targetVRF: default
  advertisements:
    - PodNetwork
  nodeSelector: {}
  networkSelectors:
    - networkSelectionType: DefaultNetwork
  frrConfigurationSelector:
    matchLabels:
      use-for-advertisements: "true"
