apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: vrf-lite-upstream
  namespace: openshift-frr-k8s
  labels:
    use-for-advertisements: "true"
spec:
  bgp:
    routers:
      - asn: 65001
        imports:
          - vrf: default
      - asn: 65001
        vrf: tenant1
        imports:
          - vrf: tenant1
        neighbors:
          - address: 172.19.0.1
            asn: 65000
            disableMP: true
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
      - asn: 65001
        vrf: tenant2
        imports:
          - vrf: tenant2
        neighbors:
          - address: 172.19.0.1
            asn: 65000
            disableMP: true
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
