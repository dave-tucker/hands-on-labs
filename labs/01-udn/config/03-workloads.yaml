# --- L3 UDN pods (one per node for east-west testing) ---
apiVersion: v1
kind: Pod
metadata:
  name: l3-pod-1
  namespace: udn-l3
  labels:
    app: network-tools
spec:
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  containers:
    - name: network-tools
      image: quay.io/openshift/origin-network-tools:latest
      command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata:
  name: l3-pod-2
  namespace: udn-l3
  labels:
    app: network-tools
spec:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  containers:
    - name: network-tools
      image: quay.io/openshift/origin-network-tools:latest
      command: ["sleep", "infinity"]
---
# --- L2 ClusterUDN pods (namespace udn-l2-a, one per node) ---
apiVersion: v1
kind: Pod
metadata:
  name: l2-pod-1
  namespace: udn-l2-a
  labels:
    app: network-tools
spec:
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  containers:
    - name: network-tools
      image: quay.io/openshift/origin-network-tools:latest
      command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata:
  name: l2-pod-2
  namespace: udn-l2-a
  labels:
    app: network-tools
spec:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  containers:
    - name: network-tools
      image: quay.io/openshift/origin-network-tools:latest
