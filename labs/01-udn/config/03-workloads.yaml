---
# --- L2 ClusterUDN pod (namespace udn-l2-b, cross-namespace test) ---
apiVersion: v1
kind: Pod
metadata:
  name: l2-pod-b
  namespace: udn-l2-b
  labels:
    app: network-tools
spec:
  containers:
    - name: network-tools
      image: quay.io/openshift/origin-network-tools:latest
      command: ["sleep", "infinity"]
---
# --- L2 ClusterUDN VM ---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: l2-vm
  namespace: udn-l2-a
spec:
  running: true
  template:
    metadata:
      labels:
        app: network-tools
    spec:
      domain:
        resources:
          requests:
            memory: 512Mi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: udn-primary
              binding:
                name: l2binding
      networks:
        - name: udn-primary
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ovnkube
              password: ovnrocks!
              chpasswd:
                expire: false
---
# --- Localnet VMs ---
# Static IPs via cloud-init since IPAM is disabled on the localnet CUDN.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: localnet-vm-1
  namespace: udn-localnet
spec:
  running: true
  template:
    metadata:
      labels:
        app: network-tools
    spec:
      domain:
        resources:
          requests:
            memory: 512Mi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: localnet
              macAddress: "02:E4:03:D9:22:4C"
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: localnet
          multus:
            networkName: udn-localnet/localnet-secondary
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ovnkube
              password: ovnrocks!
              chpasswd:
                expire: false
            networkData: |
              version: 2
              ethernets:
                enp2s0:
                  addresses:
                    - 192.168.100.20/24
                  routes:
                    - to: 172.16.0.0/31
                      via: 192.168.100.1
---
