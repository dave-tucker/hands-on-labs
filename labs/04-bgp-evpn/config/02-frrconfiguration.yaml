# BGP over loopbacks: neighbors are Leaf1 (192.168.255.11) and Leaf2
# (192.168.255.12). ebgpMultiHop and BFD so sessions run over loopbacks.
# Static routes (NNCP) must be applied first so nodes can reach leaf loopbacks.
#
# OpenShift: namespace openshift-frr-k8s. Vanilla K8s: use metallb-system or
# the namespace where FRR-K8s is installed.
#
# IMPORTANT: disableMP is NOT set (removed for EVPN support)
# NOTE: Node-specific configurations required for explicit router IDs
---
apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: bgp-evpn-master
  namespace: openshift-frr-k8s
  labels:
    use-for-advertisements: "true"
spec:
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""
  bgp:
    routers:
      - asn: 65000
        id: 192.168.255.1
        neighbors:
          - address: 192.168.255.11
            asn: 65001
            ebgpMultiHop: true
            sourceaddress: 192.168.255.1
            bfdProfile: default
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
          - address: 192.168.255.12
            asn: 65002
            ebgpMultiHop: true
            sourceaddress: 192.168.255.1
            bfdProfile: default
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
    bfdProfiles:
      - name: default
---
apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: bgp-evpn-worker
  namespace: openshift-frr-k8s
  labels:
    use-for-advertisements: "true"
spec:
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/worker: ""
  bgp:
    routers:
      - asn: 65000
        id: 192.168.255.2
        neighbors:
          - address: 192.168.255.11
            asn: 65001
            ebgpMultiHop: true
            sourceaddress: 192.168.255.2
            bfdProfile: default
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
          - address: 192.168.255.12
            asn: 65002
            ebgpMultiHop: true
            sourceaddress: 192.168.255.2
            bfdProfile: default
            toReceive:
              allowed:
                mode: all
            toAdvertise:
              allowed:
                mode: all
    bfdProfiles:
      - name: default
