frr version 10.5.1_git
frr defaults traditional
hostname leaf2
!
ip route 100.64.0.10/32 10.10.2.0
ip route 192.168.255.1/32 10.0.2.1
ip route 192.168.255.16/32 10.10.2.0
ip route 192.168.255.2/32 10.0.2.3
ip route 192.168.255.10/32 10.10.2.0
ip route 192.168.255.11/32 10.10.2.0
ip route 192.168.255.13/32 10.10.2.0
ip route 192.168.255.14/32 10.0.4.1
!
interface eth1
 ip address 10.10.2.1/31
exit
!
interface eth2
 ip address 10.0.2.0/31
exit
!
interface eth3
 ip address 10.0.2.2/31
exit
!
interface eth4
 ip address 10.0.4.0/31
exit
!
interface lo
 ip address 192.168.255.12/32
exit
!
interface lo-vtep
 ip address 100.64.0.12/32
exit
!
router bgp 65000
 bgp router-id 192.168.255.12
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp cluster-id 192.168.255.12
 neighbor 10.10.2.0 remote-as internal
 neighbor 192.168.255.1 remote-as internal
 neighbor 192.168.255.1 update-source lo
 neighbor 192.168.255.2 remote-as internal
 neighbor 192.168.255.2 update-source lo
 neighbor 192.168.255.10 remote-as internal
 neighbor 192.168.255.10 bfd
 neighbor 192.168.255.10 update-source lo
 neighbor 192.168.255.11 remote-as internal
 neighbor 192.168.255.11 update-source lo
 neighbor 192.168.255.13 remote-as 65000
 neighbor 192.168.255.13 bfd
 neighbor 192.168.255.13 update-source lo
 neighbor 192.168.255.14 remote-as 65000
 neighbor 192.168.255.14 bfd
 neighbor 192.168.255.14 update-source lo
 !
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  neighbor 10.10.2.0 activate
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-reflector-client
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.2 route-reflector-client
  neighbor 192.168.255.10 activate
  neighbor 192.168.255.11 activate
  neighbor 192.168.255.13 activate
  neighbor 192.168.255.13 route-reflector-client
  neighbor 192.168.255.14 activate
  neighbor 192.168.255.14 route-reflector-client
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-reflector-client
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.2 route-reflector-client
  neighbor 192.168.255.10 activate
  neighbor 192.168.255.11 activate
  neighbor 192.168.255.13 activate
  neighbor 192.168.255.14 activate
  advertise-all-vni
 exit-address-family
exit
!
