frr version 10.5.1_git
frr defaults traditional
hostname spine1
!
! Bootstrap static routes to leaf loopbacks (needed before BGP is up)
ip route 192.168.255.1/32 10.10.1.1
ip route 192.168.255.2/32 10.10.1.1
ip route 192.168.255.11/32 10.10.1.1
ip route 192.168.255.12/32 10.10.2.1
ip route 192.168.255.16/32 10.10.3.1
! Transit routes so leaf2 can reach ext-host VTEPs via spine1 -> leaf1
ip route 192.168.255.13/32 10.10.1.1
ip route 100.64.0.13/32 10.10.1.1
ip route 192.168.255.14/32 10.10.2.1
ip route 100.64.0.14/32 10.10.2.1
!
interface eth1
 ip address 10.10.1.0/31
exit
!
interface eth2
 ip address 10.10.2.0/31
exit
!
interface eth3
 ip address 10.10.3.0/31
exit
!
interface lo
 ip address 192.168.255.10/32
exit
!
interface lo-vtep
 ip address 100.64.0.10/32
exit
!
router bgp 65000
 bgp router-id 192.168.255.10
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp cluster-id 192.168.255.10
 neighbor 192.168.255.1 remote-as internal
 neighbor 192.168.255.1 bfd
 neighbor 192.168.255.1 update-source lo
 neighbor 192.168.255.2 remote-as internal
 neighbor 192.168.255.2 bfd
 neighbor 192.168.255.2 update-source lo
 neighbor 192.168.255.11 remote-as internal
 neighbor 192.168.255.11 bfd
 neighbor 192.168.255.11 update-source lo
 neighbor 192.168.255.12 remote-as internal
 neighbor 192.168.255.12 bfd
 neighbor 192.168.255.12 update-source lo
 neighbor 192.168.255.16 remote-as internal
 neighbor 192.168.255.16 bfd
 neighbor 192.168.255.16 update-source lo
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.16 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-reflector-client
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.2 route-reflector-client
  neighbor 192.168.255.11 activate
  neighbor 192.168.255.11 route-reflector-client
  neighbor 192.168.255.12 activate
  neighbor 192.168.255.12 route-reflector-client
  neighbor 192.168.255.16 activate
  neighbor 192.168.255.16 route-reflector-client
  advertise-all-vni
 exit-address-family
exit
!
