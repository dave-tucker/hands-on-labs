frr version 10.5.1_git
frr defaults traditional
hostname leaf1
!
ip route 100.64.0.10/32 10.10.1.0
ip route 192.168.255.1/32 10.0.1.1
ip route 192.168.255.16/32 10.10.1.0
ip route 192.168.255.2/32 10.0.1.3
ip route 192.168.255.10/32 10.10.1.0
ip route 192.168.255.12/32 10.10.1.0
ip route 192.168.255.13/32 10.0.3.1
!
interface eth1
 ip address 10.10.1.1/31
exit
!
interface eth2
 ip address 10.0.1.0/31
exit
!
interface eth3
 ip address 10.0.1.2/31
exit
!
interface eth4
 ip address 10.0.3.0/31
exit
!
interface lo
 ip address 192.168.255.11/32
exit
!
interface lo-vtep
 ip address 100.64.0.11/32
exit
!
router bgp 65000
 bgp router-id 192.168.255.11
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp cluster-id 192.168.255.11
 neighbor 10.10.1.0 remote-as internal
 neighbor 192.168.255.1 remote-as internal
 neighbor 192.168.255.1 update-source lo
 neighbor 192.168.255.2 remote-as internal
 neighbor 192.168.255.2 update-source lo
 neighbor 192.168.255.10 remote-as internal
 neighbor 192.168.255.10 bfd
 neighbor 192.168.255.10 update-source lo
 neighbor 192.168.255.12 remote-as internal
 neighbor 192.168.255.12 update-source lo
 neighbor 192.168.255.13 remote-as 65000
 neighbor 192.168.255.13 bfd
 neighbor 192.168.255.13 update-source lo
 !
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  neighbor 10.10.1.0 activate
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-reflector-client
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.2 route-reflector-client
  neighbor 192.168.255.10 activate
  neighbor 192.168.255.12 activate
  neighbor 192.168.255.13 activate
  neighbor 192.168.255.13 route-reflector-client
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.255.1 activate
  neighbor 192.168.255.1 route-reflector-client
  neighbor 192.168.255.2 activate
  neighbor 192.168.255.2 route-reflector-client
  neighbor 192.168.255.10 activate
  neighbor 192.168.255.12 activate
  neighbor 192.168.255.13 activate
  advertise-all-vni
 exit-address-family
exit
!
