frr version 10.5.1_git
frr defaults traditional
hostname ext-host
!
ip route 192.168.255.11/32 10.0.3.0
ip route 192.168.255.12/32 10.0.3.0
!
interface eth1
 ip address 10.0.3.1/31
exit
!
interface lo
 ip address 192.168.255.13/32
exit
!
interface lo-vtep
 ip address 100.64.0.13/32
exit
!
router bgp 65000
 bgp router-id 192.168.255.13
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 192.168.255.11 remote-as 65000
 neighbor 192.168.255.11 bfd
 neighbor 192.168.255.11 update-source lo
 neighbor 192.168.255.12 remote-as 65000
 neighbor 192.168.255.12 bfd
 neighbor 192.168.255.12 update-source lo
 !
 address-family ipv4 unicast
  redistribute connected
  neighbor 192.168.255.11 activate
  neighbor 192.168.255.12 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.255.11 activate
  neighbor 192.168.255.12 activate
  advertise-all-vni
  vni 100
   advertise-svi-ip
  exit-vni
 exit-address-family
exit
!
