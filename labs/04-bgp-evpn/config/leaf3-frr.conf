frr version 10.5.1_git
frr defaults traditional
hostname leaf3
!
! Bootstrap static routes so the loopback-based BGP session to spine1
! can establish before BGP learns anything.
ip route 192.168.255.10/32 10.10.3.0
! Cluster node loopbacks — needed to resolve VTEP next-hops for L3VNI return path
ip route 192.168.255.1/32 10.10.3.0
ip route 192.168.255.2/32 10.10.3.0
!
! VRF static route: ext-host3's simulated subnet reachable via P2P leg.
! Redistributed into VRF BGP as a Type-5 EVPN route (rd 192.168.255.16:201).
vrf tenant2-ipvrf
 ip route 10.70.0.0/24 10.0.5.1
 vni 201
exit-vrf
!
interface eth1
 ip address 10.10.3.1/31
exit
!
interface eth2
 ip address 10.0.5.0/31
exit
!
interface lo
 ip address 192.168.255.16/32
exit
!
interface lo-vtep
 ip address 100.64.0.16/32
exit
!
router bgp 65000
 bgp router-id 192.168.255.16
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 192.168.255.10 remote-as internal
 neighbor 192.168.255.10 bfd
 neighbor 192.168.255.10 update-source lo
 !
 address-family ipv4 unicast
  redistribute connected
  redistribute static
  neighbor 192.168.255.10 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 192.168.255.10 activate
  advertise-all-vni
 exit-address-family
exit
!
router bgp 65000 vrf tenant2-ipvrf
 no bgp ebgp-requires-policy
 no bgp network import-check
 !
 address-family ipv4 unicast
  redistribute static
  import vpn
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  rd 192.168.255.16:201
  route-target import 65000:201
  route-target export 65000:201
 exit-address-family
exit
!
